<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coursework Reward Tracker — Prodigy Solutions</title>
<style>
  :root {
    --bg: #f7f6f3;
    --surface: #ffffff;
    --surface2: #f0efe9;
    --border: #e2e0d8;
    --border-strong: #c8c6bc;
    --text: #1a1917;
    --text-muted: #706e67;
    --text-faint: #a09e97;
    --green-bg: #eaf5ec;
    --green-text: #1e6b32;
    --green-border: #b4debb;
    --amber-bg: #fef7ec;
    --amber-text: #7a4d0a;
    --amber-border: #f5d898;
    --red-bg: #fdf0f0;
    --red-text: #8b1f1f;
    --blue-bg: #eff5ff;
    --blue-text: #1a3f7a;
    --blue-border: #b8d0f5;
    --radius: 8px;
    --radius-lg: 12px;
    --shadow: 0 1px 3px rgba(0,0,0,0.07), 0 1px 2px rgba(0,0,0,0.05);
    --shadow-md: 0 4px 12px rgba(0,0,0,0.09);
    --mono: 'SF Mono', 'Fira Code', 'Consolas', monospace;
    --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
  }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-icon {
    width: 30px;
    height: 30px;
    background: #1a1917;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .logo-text {
    font-size: 14px;
    font-weight: 600;
    letter-spacing: -0.01em;
  }

  .logo-sub {
    font-size: 12px;
    color: var(--text-muted);
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: flex-end;
  }

  #sync-status {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--text-faint);
    padding: 4px 10px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--surface);
    white-space: nowrap;
  }

  #sync-status .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  #sync-status.synced .dot { background: #4caf6e; }
  #sync-status.saving .dot { background: #f0a940; animation: pulse 1s infinite; }
  #sync-status.local .dot { background: var(--text-faint); }
  #sync-status.error .dot { background: #d94f4f; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  main {
    max-width: 980px;
    margin: 0 auto;
    padding: 32px 24px;
  }

  button {
    font-family: var(--sans);
    font-size: 13px;
    padding: 7px 14px;
    border-radius: var(--radius);
    cursor: pointer;
    border: 1px solid var(--border-strong);
    background: var(--surface);
    color: var(--text);
    font-weight: 500;
    transition: background 0.1s, border-color 0.1s, transform 0.08s;
    white-space: nowrap;
  }

  button:hover { background: var(--surface2); }
  button:active { transform: scale(0.98); }
  button:disabled {
    opacity: 0.38;
    cursor: default;
    pointer-events: none;
  }

  .btn-primary {
    background: #1a1917;
    color: #fff;
    border-color: #1a1917;
  }

  .btn-primary:hover {
    background: #333;
    border-color: #333;
  }

  .btn-success {
    background: var(--green-bg);
    color: var(--green-text);
    border-color: var(--green-border);
  }

  .btn-success:hover { background: #d7f0db; }

  .btn-sm {
    font-size: 12px;
    padding: 5px 10px;
  }

  .btn-ghost {
    background: transparent;
    border-color: transparent;
    color: var(--text-muted);
  }

  .btn-ghost:hover {
    background: var(--surface2);
    border-color: var(--border);
  }

  input[type="text"], select, textarea {
    font-family: var(--sans);
    font-size: 13px;
    padding: 7px 11px;
    border: 1px solid var(--border-strong);
    border-radius: var(--radius);
    background: var(--surface);
    color: var(--text);
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
  }

  input[type="text"]:focus, select:focus, textarea:focus {
    border-color: #888;
    box-shadow: 0 0 0 3px rgba(0,0,0,0.06);
  }

  textarea {
    resize: vertical;
    min-height: 72px;
    width: 100%;
    line-height: 1.5;
  }

  .upload-wrap {
    max-width: 560px;
    margin: 48px auto 0;
  }

  .upload-header {
    text-align: center;
    margin-bottom: 32px;
  }

  .upload-header h1 {
    font-size: 24px;
    font-weight: 700;
    letter-spacing: -0.02em;
    margin-bottom: 6px;
  }

  .upload-header p {
    color: var(--text-muted);
    font-size: 14px;
  }

  .drop-zone {
    border: 1.5px dashed var(--border-strong);
    border-radius: var(--radius-lg);
    padding: 28px 24px;
    text-align: center;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    background: var(--surface);
    margin-bottom: 12px;
  }

  .drop-zone:hover, .drop-zone.drag-over {
    background: var(--blue-bg);
    border-color: #90b4e8;
  }

  .drop-zone-icon {
    width: 40px;
    height: 40px;
    background: var(--surface2);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 12px;
  }

  .drop-zone-title {
    font-size: 14px;
    font-weight: 500;
    margin-bottom: 4px;
  }

  .drop-zone-sub {
    font-size: 12px;
    color: var(--text-muted);
  }

  .file-loaded {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px;
    background: var(--green-bg);
    color: var(--green-text);
    border-radius: 20px;
    font-size: 12px;
    font-weight: 500;
    margin-top: 8px;
    border: 1px solid var(--green-border);
  }

  .sp-banner {
    background: var(--blue-bg);
    border: 1px solid var(--blue-border);
    border-radius: var(--radius);
    padding: 12px 16px;
    font-size: 13px;
    color: var(--blue-text);
    margin-top: 16px;
    display: flex;
    align-items: flex-start;
    gap: 10px;
  }

  .sp-banner-icon {
    font-size: 16px;
    flex-shrink: 0;
    margin-top: 1px;
  }

  .ledger-notice {
    background: var(--amber-bg);
    border: 1px solid var(--amber-border);
    border-radius: var(--radius);
    padding: 10px 14px;
    font-size: 13px;
    color: var(--amber-text);
    margin-top: 12px;
  }

  .last-updated-banner {
    background: var(--blue-bg);
    border: 1px solid var(--blue-border);
    border-radius: var(--radius-lg);
    padding: 12px 14px;
    margin-bottom: 16px;
    color: var(--blue-text);
    display: flex;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
    box-shadow: var(--shadow);
  }

  .last-updated-title {
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .last-updated-text {
    font-size: 13px;
  }

  .map-wrap {
    max-width: 560px;
    margin: 40px auto 0;
  }

  .map-section-title {
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-faint);
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  .map-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 10px;
  }

  .map-label {
    width: 180px;
    font-size: 13px;
    color: var(--text-muted);
    flex-shrink: 0;
  }

  .map-select {
    flex: 1;
  }

  .stats-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 24px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 16px 18px;
    box-shadow: var(--shadow);
  }

  .stat-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-faint);
    margin-bottom: 6px;
  }

  .stat-value {
    font-size: 26px;
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1;
  }

  .stat-value.green { color: var(--green-text); }

  .controls-bar {
    display: flex;
    gap: 8px;
    align-items: center;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }

  .search-input {
    flex: 1;
    min-width: 200px;
  }

  .section-heading {
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--text-faint);
    padding: 0 0 8px;
    margin: 20px 0 6px;
    border-bottom: 1px solid var(--border);
  }

  .inmate-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    margin-bottom: 6px;
    overflow: hidden;
    box-shadow: var(--shadow);
    transition: box-shadow 0.15s;
  }

  .inmate-card:hover { box-shadow: var(--shadow-md); }

  .inmate-header {
    display: flex;
    align-items: center;
    padding: 12px 16px;
    cursor: pointer;
    gap: 12px;
    user-select: none;
  }

  .badge {
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    white-space: nowrap;
    flex-shrink: 0;
    min-width: 90px;
    text-align: center;
  }

  .badge-eligible {
    background: var(--green-bg);
    color: var(--green-text);
    border: 1px solid var(--green-border);
  }

  .badge-pending {
    background: var(--surface2);
    color: var(--text-muted);
    border: 1px solid var(--border);
  }

  .inmate-name {
    flex: 1;
    min-width: 0;
  }

  .inmate-name-primary {
    font-size: 14px;
    font-weight: 600;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .inmate-name-sub {
    font-size: 11px;
    color: var(--text-faint);
    font-family: var(--mono);
    margin-top: 1px;
  }

  .inmate-time {
    text-align: right;
    flex-shrink: 0;
  }

  .inmate-time-main {
    font-size: 13px;
    font-family: var(--mono);
    font-weight: 500;
  }

  .inmate-time-sub {
    font-size: 11px;
    color: var(--text-faint);
    margin-top: 1px;
  }

  .inmate-chevron {
    color: var(--text-faint);
    font-size: 10px;
    flex-shrink: 0;
    transition: transform 0.15s;
  }

  .inmate-chevron.open { transform: rotate(180deg); }

  .inmate-detail {
    border-top: 1px solid var(--border);
    padding: 16px;
    background: var(--surface2);
    display: none;
  }

  .inmate-detail.open { display: block; }

  .detail-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin-bottom: 14px;
  }

  .detail-stat {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 12px;
  }

  .detail-stat-label {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-faint);
    margin-bottom: 4px;
  }

  .detail-stat-value {
    font-size: 16px;
    font-weight: 700;
    font-family: var(--mono);
    letter-spacing: -0.01em;
  }

  .action-row {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
    align-items: center;
    flex-wrap: wrap;
  }

  .note-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-faint);
    margin-bottom: 6px;
  }

  .last-applied {
    font-size: 11px;
    color: var(--text-faint);
    margin-top: 8px;
  }

  .progress-bar-wrap {
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin-top: 6px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    border-radius: 2px;
    background: #1a1917;
    transition: width 0.3s ease;
  }

  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-muted);
  }

  .empty-state-title {
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 4px;
  }

  .divider {
    width: 1px;
    height: 20px;
    background: var(--border);
    display: inline-block;
    margin: 0 2px;
    vertical-align: middle;
  }

  #toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: #1a1917;
    color: #fff;
    padding: 10px 18px;
    border-radius: var(--radius-lg);
    font-size: 13px;
    font-weight: 500;
    opacity: 0;
    transform: translateY(6px);
    transition: opacity 0.2s, transform 0.2s;
    pointer-events: none;
    z-index: 999;
    max-width: 320px;
  }

  #toast.show {
    opacity: 1;
    transform: translateY(0);
  }

  @media (max-width: 640px) {
    main { padding: 20px 16px; }
    .stats-grid { grid-template-columns: repeat(2, 1fr); }
    .detail-grid { grid-template-columns: repeat(2, 1fr); }
    header { padding: 0 16px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <rect x="2" y="8" width="3" height="6" rx="1" fill="white" opacity="0.9"/>
        <rect x="6.5" y="5" width="3" height="9" rx="1" fill="white" opacity="0.9"/>
        <rect x="11" y="2" width="3" height="12" rx="1" fill="white" opacity="0.9"/>
      </svg>
    </div>
    <div>
      <div class="logo-text">Reward Tracker</div>
      <div class="logo-sub">Prodigy Solutions — Coursework Rewards</div>
    </div>
  </div>
  <div class="header-right">
    <div id="sync-status">
      <div class="dot"></div>
      <span id="sync-label"></span>
    </div>
    <div id="header-actions"></div>
  </div>
</header>

<main id="main"></main>
<div id="toast"></div>

<script>
// ── SharePoint detection & storage ────────────────────────────────────────────
const SP = (() => {
  const isHosted = window.location.hostname.includes('.sharepoint.com');

  function getSiteUrl() {
    const url = new URL(window.location.href);
    const parts = url.pathname.split('/').filter(Boolean);
    const siteIdx = parts.findIndex(p => p === 'sites' || p === 'teams');
    if (siteIdx !== -1 && parts[siteIdx + 1]) {
      return url.origin + '/' + parts.slice(0, siteIdx + 2).join('/');
    }
    return url.origin;
  }

  function getFileFolder() {
    const parts = new URL(window.location.href).pathname.split('/');
    parts.pop();
    return parts.join('/');
  }

  async function getDigest(siteUrl) {
    const r = await fetch(siteUrl + '/_api/contextinfo', {
      method: 'POST',
      headers: { 'Accept': 'application/json;odata=verbose' },
      credentials: 'include'
    });
    const d = await r.json();
    return d.d.GetContextWebInformation.FormDigestValue;
  }

  async function loadFile(filename) {
    if (!isHosted) return null;
    try {
      const siteUrl = getSiteUrl();
      const folder = getFileFolder();
      const r = await fetch(
        siteUrl + `/_api/web/GetFileByServerRelativeUrl('${folder}/${filename}')/$value`,
        {
          credentials: 'include',
          headers: { 'Accept': 'text/plain' }
        }
      );
      if (r.ok) return JSON.parse(await r.text());
    } catch (err) {
      console.error('SharePoint load error:', filename, err);
    }
    return null;
  }

  async function saveFile(filename, data) {
    if (!isHosted) return false;
    try {
      const siteUrl = getSiteUrl();
      const folder = getFileFolder();
      const digest = await getDigest(siteUrl);
      const r = await fetch(
        siteUrl + `/_api/web/GetFolderByServerRelativeUrl('${folder}')/Files/Add(url='${filename}',overwrite=true)`,
        {
          method: 'POST',
          credentials: 'include',
          headers: {
            'Accept': 'application/json;odata=verbose',
            'X-RequestDigest': digest
          },
          body: JSON.stringify(data, null, 2)
        }
      );
      return r.ok;
    } catch (err) {
      console.error('SharePoint save error:', filename, err);
      return false;
    }
  }

  async function load() {
    return loadFile('reward_ledger.json');
  }

  async function save(ledger) {
    return saveFile('reward_ledger.json', ledger);
  }

  async function loadFacilities() {
    return loadFile('facility_data.json');
  }

  async function saveFacilities(fd) {
    return saveFile('facility_data.json', fd);
  }

  async function loadMeta() {
    return loadFile('reward_meta.json');
  }

  async function saveMeta(meta) {
    return saveFile('reward_meta.json', meta);
  }

  return { isHosted, load, save, loadFacilities, saveFacilities, loadMeta, saveMeta };
})();

// ── Local fallback ────────────────────────────────────────────────────────────
const LOCAL_KEY = 'prodigy_reward_ledger_v3';
const FACILITY_KEY = 'prodigy_facility_data_v3';
const META_KEY = 'prodigy_reward_meta_v3';

function localLoad() {
  try { return JSON.parse(localStorage.getItem(LOCAL_KEY) || 'null'); } catch { return null; }
}
function localSave(ledger) {
  try { localStorage.setItem(LOCAL_KEY, JSON.stringify(ledger)); } catch {}
}
function localLoadFacilities() {
  try { return JSON.parse(localStorage.getItem(FACILITY_KEY) || 'null'); } catch { return null; }
}
function localSaveFacilities(fd) {
  try { localStorage.setItem(FACILITY_KEY, JSON.stringify(fd)); } catch {}
}
function localLoadMeta() {
  try { return JSON.parse(localStorage.getItem(META_KEY) || 'null'); } catch { return null; }
}
function localSaveMeta(meta) {
  try { localStorage.setItem(META_KEY, JSON.stringify(meta)); } catch {}
}

// ── Sync status UI ────────────────────────────────────────────────────────────
function setSyncStatus(stateClass, label) {
  const el = document.getElementById('sync-status');
  const lbl = document.getElementById('sync-label');
  if (!el || !lbl) return;
  el.className = stateClass;
  lbl.textContent = label;
}

// ── State ─────────────────────────────────────────────────────────────────────
let state = {
  phase: 'upload',
  logsData: null,
  usersData: null,
  colMap: { username: '', facility: '', time: '' },
  usersColMap: { username: '', fullname: '' },
  inmates: [],
  facilityData: {},
  nameMap: {},
  ledger: {},
  meta: {
    lastServerSync: '',
    lastSavedBy: '',
    lastSavedAt: '',
    version: 1
  },
  filter: 'ALL',
  search: '',
  sort: 'eligible',
  expanded: null,
  currentUser: ''
};

let saveTimer = null;
let lastLoadedSignature = '';

function makeSignature(ledger, facilityData, meta) {
  return JSON.stringify({
    ledger: ledger || {},
    facilityData: facilityData || {},
    meta: meta || {}
  });
}

function getCurrentUser() {
  if (state.currentUser) return state.currentUser;
  let saved = '';
  try { saved = localStorage.getItem('prodigy_reward_current_user') || ''; } catch {}
  if (saved) {
    state.currentUser = saved;
    return saved;
  }
  const entered = prompt('Enter your name for reward tracking:', '') || '';
  const clean = entered.trim() || 'Unknown Rep';
  state.currentUser = clean;
  try { localStorage.setItem('prodigy_reward_current_user', clean); } catch {}
  return clean;
}

function setCurrentUserName() {
  const entered = prompt('Enter your name:', state.currentUser || '') || '';
  const clean = entered.trim();
  if (!clean) return;
  state.currentUser = clean;
  try { localStorage.setItem('prodigy_reward_current_user', clean); } catch {}
  toast('Signed in as ' + clean);
  render();
}

function formatSavedDate(iso) {
  if (!iso) return 'Not saved yet';
  const d = new Date(iso);
  if (isNaN(d.getTime())) return iso;
  return d.toLocaleString();
}

function getLastUpdatedText() {
  if (!state.meta.lastSavedAt && !state.meta.lastSavedBy) {
    return 'No shared save recorded yet.';
  }
  const by = state.meta.lastSavedBy || 'Unknown';
  const when = formatSavedDate(state.meta.lastSavedAt);
  return `Last updated by ${by} on ${when}`;
}

async function initLedger() {
  getCurrentUser();

  if (SP.isHosted) {
    setSyncStatus('saving', 'Connecting...');
    const [ledgerData, facilityData, metaData] = await Promise.all([
      SP.load(),
      SP.loadFacilities(),
      SP.loadMeta()
    ]);

    if (ledgerData) {
      state.ledger = ledgerData;
    } else {
      const local = localLoad();
      if (local) state.ledger = local;
    }

    if (facilityData) {
      state.facilityData = facilityData;
      state.inmates = flattenFacilities();
    } else {
      const localFac = localLoadFacilities();
      if (localFac) {
        state.facilityData = localFac;
        state.inmates = flattenFacilities();
      }
    }

    if (metaData) {
      state.meta = metaData;
    } else {
      const localMeta = localLoadMeta();
      if (localMeta) state.meta = localMeta;
    }

    lastLoadedSignature = makeSignature(state.ledger, state.facilityData, state.meta);
    setSyncStatus('synced', 'Live — Shared system');
  } else {
    const local = localLoad();
    if (local) state.ledger = local;

    const localFac = localLoadFacilities();
    if (localFac) {
      state.facilityData = localFac;
      state.inmates = flattenFacilities();
    }

    const localMeta = localLoadMeta();
    if (localMeta) state.meta = localMeta;

    lastLoadedSignature = makeSignature(state.ledger, state.facilityData, state.meta);
    setSyncStatus('local', 'Offline mode');
  }
}

async function refreshFromServer() {
  if (!SP.isHosted) return true;

  try {
    setSyncStatus('saving', 'Refreshing...');
    const [ledgerData, facilityData, metaData] = await Promise.all([
      SP.load(),
      SP.loadFacilities(),
      SP.loadMeta()
    ]);

    if (ledgerData) state.ledger = ledgerData;
    if (facilityData) {
      state.facilityData = facilityData;
      state.inmates = flattenFacilities();
    }
    if (metaData) state.meta = metaData;

    lastLoadedSignature = makeSignature(state.ledger, state.facilityData, state.meta);
    setSyncStatus('synced', 'Live — Shared system');
    return true;
  } catch (err) {
    console.error('refreshFromServer error', err);
    setSyncStatus('error', 'Refresh failed');
    return false;
  }
}

async function persistLedger() {
  const user = getCurrentUser();

  if (SP.isHosted) {
    setSyncStatus('saving', 'Checking for changes...');

    const [serverLedger, serverFacilities, serverMeta] = await Promise.all([
      SP.load(),
      SP.loadFacilities(),
      SP.loadMeta()
    ]);

    const currentServerSignature = makeSignature(
      serverLedger || {},
      serverFacilities || {},
      serverMeta || {}
    );

    if (lastLoadedSignature && currentServerSignature && currentServerSignature !== lastLoadedSignature) {
      state.ledger = serverLedger || {};
      state.facilityData = serverFacilities || {};
      state.inmates = flattenFacilities();
      state.meta = serverMeta || state.meta;
      lastLoadedSignature = currentServerSignature;
      setSyncStatus('error', 'Server changed — refreshed');
      toast('Someone else made changes. Data was refreshed before saving.');
      render();
      return false;
    }

    state.meta = {
      ...state.meta,
      lastSavedBy: user,
      lastSavedAt: new Date().toISOString(),
      version: (state.meta.version || 1) + 1
    };

    setSyncStatus('saving', 'Saving...');
    const [ok1, ok2, ok3] = await Promise.all([
      SP.save(state.ledger),
      SP.saveFacilities(state.facilityData),
      SP.saveMeta(state.meta)
    ]);

    const ok = ok1 && ok2 && ok3;

    if (ok) {
      lastLoadedSignature = makeSignature(state.ledger, state.facilityData, state.meta);
      setSyncStatus('synced', 'Live — Shared system');
    } else {
      localSave(state.ledger);
      localSaveFacilities(state.facilityData);
      localSaveMeta(state.meta);
      setSyncStatus('error', 'Save failed — local backup used');
    }

    return ok;
  } else {
    state.meta = {
      ...state.meta,
      lastSavedBy: user,
      lastSavedAt: new Date().toISOString(),
      version: (state.meta.version || 1) + 1
    };
    localSave(state.ledger);
    localSaveFacilities(state.facilityData);
    localSaveMeta(state.meta);
    lastLoadedSignature = makeSignature(state.ledger, state.facilityData, state.meta);
    setSyncStatus('local', 'Offline mode');
    return true;
  }
}

// ── CSV ───────────────────────────────────────────────────────────────────────
function parseCSV(text) {
  const lines = text.trim().split(/\r?\n/);
  if (lines.length < 2) return { headers: [], rows: [] };

  function parseRow(line) {
    const row = [];
    let current = '';
    let inQuotes = false;

    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      const next = line[i + 1];

      if (ch === '"' && inQuotes && next === '"') {
        current += '"';
        i++;
      } else if (ch === '"') {
        inQuotes = !inQuotes;
      } else if (ch === ',' && !inQuotes) {
        row.push(current.trim());
        current = '';
      } else {
        current += ch;
      }
    }

    row.push(current.trim());
    return row;
  }

  const headers = parseRow(lines[0]);
  const rows = lines.slice(1).filter(l => l.trim()).map(line => {
    const values = parseRow(line);
    return Object.fromEntries(headers.map((h, i) => [h, values[i] ?? '']));
  });

  return { headers, rows };
}

function detectLogsCols(headers) {
  const h = headers.map(x => x.toLowerCase().replace(/[^a-z]/g, ''));
  const find = (...terms) => {
    for (const t of terms) {
      const i = h.findIndex(x => x.includes(t));
      if (i !== -1) return headers[i];
    }
    return '';
  };
  return {
    username: find('username', 'learner', 'user', 'inmate', 'student'),
    facility: find('facilityname', 'facility', 'location', 'site'),
    time: find('timespentsec', 'timespent', 'time', 'duration', 'seconds')
  };
}

function detectUsersCols(headers) {
  const h = headers.map(x => x.toLowerCase().replace(/[^a-z]/g, ''));
  const find = (...terms) => {
    for (const t of terms) {
      const i = h.findIndex(x => x.includes(t));
      if (i !== -1) return headers[i];
    }
    return '';
  };
  return {
    username: find('usernameusername', 'username', 'user'),
    fullname: find('fullnamefull', 'fullname', 'name')
  };
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function fmtTime(secs) {
  const h = Math.floor(secs / 3600);
  const m = Math.floor((secs % 3600) / 60);
  if (h === 0 && m === 0) return '< 1m';
  if (h === 0) return m + 'm';
  if (m === 0) return h + 'h 0m';
  return h + 'h ' + m + 'm';
}

function fmtHrs(hrs) {
  return hrs.toFixed(2) + 'h';
}

function nameFor(u) {
  return state.nameMap[u] || state.nameMap[String(u)] || '';
}

function displayName(u) {
  return nameFor(u) || u;
}

function flattenFacilities() {
  return Object.values(state.facilityData).flatMap(f => f.inmates || []);
}

function getWeekKey(dateStr) {
  const d = dateStr ? new Date(dateStr) : new Date();
  const date = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  const dayNum = date.getUTCDay() || 7;
  date.setUTCDate(date.getUTCDate() + 4 - dayNum);
  const yearStart = new Date(Date.UTC(date.getUTCFullYear(), 0, 1));
  const weekNum = Math.ceil((((date - yearStart) / 86400000) + 1) / 7);
  return `${date.getUTCFullYear()}-W${String(weekNum).padStart(2, '0')}`;
}

function getLedgerRecord(username) {
  return state.ledger[username] || {};
}

function isClaimedByOther(username) {
  const rec = getLedgerRecord(username);
  return !!rec.claimedBy && rec.claimedBy !== getCurrentUser();
}

function canApplyThisWeek(username) {
  const rec = getLedgerRecord(username);
  if (!rec.lastAppliedAt) return true;
  return getWeekKey(rec.lastAppliedAt) !== getWeekKey(new Date().toISOString());
}

function getStats(inmate) {
  const totalHours = inmate.totalSecs / 3600;
  const rec = getLedgerRecord(inmate.username);
  const rewarded = rec.rewarded || 0;
  const hoursApplied = rewarded * 2;
  const banked = Math.max(totalHours - hoursApplied, 0);
  const eligible = Math.floor(banked / 2);
  const hoursUntilNext = eligible > 0 ? 0 : 2 - (banked % 2);
  const pct = Math.min(((banked % 2) / 2) * 100, 100);

  return {
    totalHours,
    rewarded,
    hoursApplied,
    banked,
    eligible,
    hoursUntilNext,
    pct,
    note: rec.note || '',
    lastApplied: rec.lastApplied || '',
    lastAppliedBy: rec.lastAppliedBy || '',
    claimedBy: rec.claimedBy || '',
    claimedAt: rec.claimedAt || '',
    canApplyThisWeek: canApplyThisWeek(inmate.username)
  };
}

function getProcessed() {
  return state.inmates
    .map(i => ({ ...i, stats: getStats(i) }))
    .filter(i => {
      const facilityMatch = state.filter === 'ALL' || i.facility === state.filter;
      const q = state.search.toLowerCase();
      const searchMatch =
        !q ||
        i.username.toLowerCase().includes(q) ||
        (nameFor(i.username) || '').toLowerCase().includes(q);
      return facilityMatch && searchMatch;
    })
    .sort((a, b) => {
      if (state.sort === 'eligible') {
        return b.stats.eligible - a.stats.eligible || b.stats.banked - a.stats.banked;
      }
      if (state.sort === 'hours') {
        return b.stats.totalHours - a.stats.totalHours;
      }
      return displayName(a.username).localeCompare(displayName(b.username));
    });
}

function importLedger() {
  const inp = document.createElement('input');
  inp.type = 'file';
  inp.accept = '.json';
  inp.addEventListener('change', e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const data = JSON.parse(ev.target.result);
        if (typeof data !== 'object' || Array.isArray(data)) throw new Error();

        if (data.ledger && data.facilityData) {
          state.ledger = data.ledger;
          state.facilityData = data.facilityData;
          state.meta = data.meta || state.meta;
          state.inmates = flattenFacilities();
        } else {
          state.ledger = data;
        }

        scheduleSave();
        toast('Backup restored');
        render();
      } catch {
        toast('Error: invalid backup file');
      }
    };
    reader.readAsText(file);
  });
  inp.click();
}

function downloadCSV(rows, filename) {
  const csv = rows
    .map(r => r.map(c => '"' + String(c).replace(/"/g, '""') + '"').join(','))
    .join('\n');

  const blob = new Blob([csv], { type: 'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
}

async function claimInmate(username) {
  await refreshFromServer();

  const user = getCurrentUser();
  const rec = getLedgerRecord(username);

  if (rec.claimedBy && rec.claimedBy !== user) {
    toast('Already claimed by ' + rec.claimedBy);
    render();
    return;
  }

  state.ledger[username] = {
    ...rec,
    claimedBy: user,
    claimedAt: new Date().toISOString()
  };

  const ok = await persistLedger();
  if (ok) toast('Claimed — ' + displayName(username));
  render();
}

async function unclaimInmate(username) {
  await refreshFromServer();

  const user = getCurrentUser();
  const rec = getLedgerRecord(username);

  if (rec.claimedBy && rec.claimedBy !== user) {
    toast('Only ' + rec.claimedBy + ' can unclaim this');
    render();
    return;
  }

  state.ledger[username] = {
    ...rec,
    claimedBy: '',
    claimedAt: ''
  };

  const ok = await persistLedger();
  if (ok) toast('Unclaimed — ' + displayName(username));
  render();
}

async function applyReward(username) {
  await refreshFromServer();

  const user = getCurrentUser();
  const inmate = state.inmates.find(i => i.username === username);
  if (!inmate) {
    toast('Inmate not found');
    return;
  }

  const stats = getStats(inmate);
  const rec = getLedgerRecord(username);

  if (rec.claimedBy && rec.claimedBy !== user) {
    toast('Claimed by ' + rec.claimedBy);
    render();
    return;
  }

  if (stats.eligible <= 0) {
    toast('Not yet eligible');
    return;
  }

  if (!stats.canApplyThisWeek) {
    toast('Already received a reward this week');
    return;
  }

  state.ledger[username] = {
    ...rec,
    rewarded: (rec.rewarded || 0) + 1,
    lastApplied: new Date().toLocaleDateString(),
    lastAppliedAt: new Date().toISOString(),
    lastAppliedBy: user,
    claimedBy: '',
    claimedAt: ''
  };

  const ok = await persistLedger();
  if (ok) toast('Reward applied — ' + displayName(username));
  render();
}

async function undoReward(username) {
  await refreshFromServer();

  const user = getCurrentUser();
  const rec = getLedgerRecord(username);

  if (!rec.rewarded || rec.rewarded <= 0) {
    toast('No reward to undo');
    return;
  }

  if (rec.claimedBy && rec.claimedBy !== user) {
    toast('Claimed by ' + rec.claimedBy);
    render();
    return;
  }

  state.ledger[username] = {
    ...rec,
    rewarded: rec.rewarded - 1,
    lastUndoBy: user,
    lastUndoAt: new Date().toISOString()
  };

  const ok = await persistLedger();
  if (ok) toast('Reward undone — ' + displayName(username));
  render();
}

async function saveNote(username) {
  await refreshFromServer();

  const ta = document.getElementById('note-' + username);
  if (!ta) return;

  const rec = getLedgerRecord(username);
  state.ledger[username] = {
    ...rec,
    note: ta.value,
    noteUpdatedBy: getCurrentUser(),
    noteUpdatedAt: new Date().toISOString()
  };

  const ok = await persistLedger();
  if (ok) toast('Note saved');
}

function autoProcess() {
  const detected = detectLogsCols(state.logsData.headers);
  if (!detected.username || !detected.time) {
    state.colMap = detected;
    state.phase = 'map';
    render();
    toast('Could not detect columns automatically — please map them manually');
    return;
  }

  state.colMap = detected;
  if (state.usersData) {
    state.usersColMap = detectUsersCols(state.usersData.headers);
  }
  processCSV();
}

function processCSV() {
  const newNameMap = {};

  if (state.usersData && state.usersColMap.username && state.usersColMap.fullname) {
    state.usersData.rows.forEach(row => {
      const u = String(row[state.usersColMap.username] || '').trim();
      const n = String(row[state.usersColMap.fullname] || '').trim();
      if (u && n) newNameMap[u] = n;
    });
  }

  const grouped = {};
  const facilitiesInThisCSV = new Set();

  state.logsData.rows.forEach(row => {
    const username = String(row[state.colMap.username] || '').trim();
    const facility = state.colMap.facility
      ? String(row[state.colMap.facility] || 'Unknown').trim()
      : 'Unknown';
    const secs = parseFloat(row[state.colMap.time] || 0) || 0;

    if (!username) return;

    facilitiesInThisCSV.add(facility);

    if (!grouped[username]) {
      grouped[username] = {
        username,
        facility,
        totalSecs: 0
      };
    }

    grouped[username].totalSecs += secs;
  });

  facilitiesInThisCSV.forEach(fac => {
    const inmates = Object.values(grouped).filter(i => i.facility === fac);
    state.facilityData[fac] = {
      inmates,
      updatedAt: new Date().toLocaleDateString(),
      updatedBy: getCurrentUser()
    };
  });

  state.nameMap = { ...state.nameMap, ...newNameMap };
  state.inmates = flattenFacilities();

  scheduleSave();
  state.phase = 'dashboard';
  render();
}

// ── File handling ─────────────────────────────────────────────────────────────
function handleFile(file, type) {
  if (!file || !file.name.toLowerCase().endsWith('.csv')) {
    toast('Please upload a CSV file');
    return;
  }

  const reader = new FileReader();
  reader.onload = e => {
    const parsed = parseCSV(e.target.result);
    if (type === 'logs') {
      state.logsData = parsed;
    } else {
      state.usersData = parsed;
    }
    render();
  };
  reader.readAsText(file);
}

function setupDrop(zoneId, type) {
  const zone = document.getElementById(zoneId);
  if (!zone) return;

  zone.addEventListener('dragover', e => {
    e.preventDefault();
    zone.classList.add('drag-over');
  });

  zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));

  zone.addEventListener('drop', e => {
    e.preventDefault();
    zone.classList.remove('drag-over');
    handleFile(e.dataTransfer.files[0], type);
  });

  zone.addEventListener('click', () => {
    const input = document.getElementById(type + '-input');
    if (input) input.click();
  });

  const inp = document.getElementById(type + '-input');
  if (inp) {
    inp.addEventListener('change', e => handleFile(e.target.files[0], type));
  }
}

// ── Element builder ───────────────────────────────────────────────────────────
function h(tag, attrs, ...children) {
  const el = document.createElement(tag);

  if (attrs) {
    for (const [k, v] of Object.entries(attrs)) {
      if (k === 'class') el.className = v;
      else if (k === 'html') el.innerHTML = v;
      else if (k.startsWith('on')) el.addEventListener(k.slice(2), v);
      else el.setAttribute(k, v);
    }
  }

  for (const c of children.flat()) {
    if (c == null) continue;
    el.append(typeof c === 'string' ? document.createTextNode(c) : c);
  }

  return el;
}

  const main = document.getElementById('main');

  function selectRow(label, headers, value, onchange) {
    const sel = h('select', { class: 'map-select' });
    sel.append(h('option', { value: '' }, '— not mapped —'));

    headers.forEach(hdr => {
      const opt = document.createElement('option');
      opt.value = hdr;
      opt.textContent = hdr;
      if (value === hdr) opt.selected = true;
      sel.append(opt);
    });

    sel.addEventListener('change', e => onchange(e.target.value));

    return h('div', { class: 'map-row' },
      h('div', { class: 'map-label' }, label),
      sel
    );
  }

  main.append(h('div', { class: 'map-wrap' },
    h('h2', {
      style: 'font-size:20px;font-weight:700;letter-spacing:-0.02em;margin-bottom:6px;'
    }, 'Map your columns'),
    h('p', {
      style: 'color:var(--text-muted);font-size:13px;margin-bottom:24px;'
    }, state.logsData.rows.length + ' rows detected. Confirm the column mapping below.'),
    h('div', { class: 'map-section-title' }, 'Usage log columns'),
    selectRow('Inmate username / ID *', state.logsData.headers, state.colMap.username, v => {
      state.colMap.username = v;
      render();
    }),
    selectRow('Time spent (seconds) *', state.logsData.headers, state.colMap.time, v => {
      state.colMap.time = v;
      render();
    }),
    selectRow('Facility name (optional)', state.logsData.headers, state.colMap.facility, v => {
      state.colMap.facility = v;
      render();
    }),
    state.usersData ? h('div', null,
      h('div', {
        class: 'map-section-title',
        style: 'margin-top:20px;'
      }, 'Users CSV columns'),
      selectRow('Username column', state.usersData.headers, state.usersColMap.username, v => {
        state.usersColMap.username = v;
        render();
      }),
      selectRow('Full name column', state.usersData.headers, state.usersColMap.fullname, v => {
        state.usersColMap.fullname = v;
        render();
      })
    ) : null,
    h('div', { style: 'display:flex;gap:8px;margin-top:24px;' },
      h('button', {
        class: 'btn-primary',
        style: 'flex:1;padding:10px;font-size:14px;',
        onclick: processCSV,
        ...((state.colMap.username && state.colMap.time) ? {} : { disabled: '' })
      }, 'Process data →'),
      h('button', {
        onclick: () => {
          state.phase = 'upload';
          render();
        }
      }, '← Back')
    )
  ));
}

function renderDashboard() {
  const processed = getProcessed();
  const eligible = processed.filter(i => i.stats.eligible > 0);
  const totalHrs = processed.reduce((s, i) => s + i.stats.totalHours, 0);
  const totalRewarded = processed.reduce((s, i) => s + i.stats.rewarded, 0);
  const facilities = ['ALL', ...new Set(state.inmates.map(i => i.facility))];
  const main = document.getElementById('main');

  document.getElementById('header-actions').append(
    h('button', { class: 'btn-sm btn-ghost', onclick: setCurrentUserName }, '👤 ' + getCurrentUser()),
    h('button', { class: 'btn-sm', onclick: refreshDashboard }, '↻ Refresh'),
    h('span', { class: 'divider' }),
    h('button', { class: 'btn-sm', onclick: exportEligible }, '↓ Export eligible'),
    h('button', { class: 'btn-sm', onclick: exportAll }, '↓ Export all'),
    h('span', { class: 'divider' }),
    h('button', { class: 'btn-sm btn-ghost', onclick: exportLedger, title: 'Download a backup of all reward history' }, '↓ Backup ledger'),
    h('button', { class: 'btn-sm btn-ghost', onclick: importLedger, title: 'Restore ledger from a backup file' }, '↑ Restore ledger'),
    h('span', { class: 'divider' }),
    h('button', {
      class: 'btn-sm btn-ghost',
      onclick: () => {
        state.phase = 'upload';
        state.logsData = null;
        state.usersData = null;
        render();
      }
    }, '+ Add / update facility')
  );

  const lastUpdatedBanner = h('div', { class: 'last-updated-banner' },
    h('div', {},
      h('div', { class: 'last-updated-title' }, 'System Status'),
      h('div', { class: 'last-updated-text' }, getLastUpdatedText())
    ),
    h('div', { class: 'last-updated-text' },
      'Version ' + (state.meta.version || 1)
    )
  );

  const statsGrid = h('div', { class: 'stats-grid' },
    statCard('Eligible', eligible.length, eligible.length > 0 ? 'green' : ''),
    statCard('Total Inmates', processed.length),
    statCard('Total Hours', totalHrs.toFixed(1) + 'h'),
    statCard('Rewards Applied', totalRewarded)
  );

  const searchEl = h('input', {
    type: 'text',
    class: 'search-input',
    placeholder: 'Search name or ID...'
  });
  searchEl.value = state.search;
  searchEl.addEventListener('input', e => {
    state.search = e.target.value;
    listEl.innerHTML = '';
    buildList(listEl, getProcessed());
  });

  const facSel = h('select');
  facilities.forEach(f => {
    const o = document.createElement('option');
    o.value = f;
    o.textContent = f === 'ALL' ? 'All facilities' : f;
    if (state.filter === f) o.selected = true;
    facSel.append(o);
  });
  facSel.addEventListener('change', e => {
    state.filter = e.target.value;
    listEl.innerHTML = '';
    buildList(listEl, getProcessed());
  });

  const sortSel = h('select');
  [
    ['eligible','Eligible first'],
    ['hours','Most hours'],
    ['name','Name A–Z']
  ].forEach(([v,l]) => {
    const o = document.createElement('option');
    o.value = v;
    o.textContent = l;
    if (state.sort === v) o.selected = true;
    sortSel.append(o);
  });
  sortSel.addEventListener('change', e => {
    state.sort = e.target.value;
    listEl.innerHTML = '';
    buildList(listEl, getProcessed());
  });

  const listEl = h('div', {});
  main.append(lastUpdatedBanner, statsGrid, h('div', { class: 'controls-bar' }, searchEl, facSel, sortSel), listEl);
  buildList(listEl, processed);
}

async function refreshDashboard() {
  const ok = await refreshFromServer();
  if (ok) {
    toast('Refreshed');
    render();
  }
}

function statCard(label, value, cls) {
  return h('div', { class: 'stat-card' },
    h('div', { class: 'stat-label' }, label),
    h('div', { class: 'stat-value' + (cls ? ' ' + cls : '') }, String(value))
  );
}

function buildList(container, processed) {
  container.innerHTML = '';

  const elig = processed.filter(i => i.stats.eligible > 0);
  const nyet = processed.filter(i => i.stats.eligible === 0);

  if (!elig.length && !nyet.length) {
    container.append(
      h('div', { class: 'empty-state' },
        h('div', { class: 'empty-state-title' }, 'No results'),
        h('p', {}, 'Try adjusting your search or filter')
      )
    );
    return;
  }

  if (elig.length) {
    container.append(h('div', { class: 'section-heading' }, 'Eligible for reward — ' + elig.length + ' inmates'));
    elig.forEach(i => container.append(inmateCard(i)));
  }

  if (nyet.length) {
    container.append(h('div', { class: 'section-heading' }, 'Not yet eligible — ' + nyet.length + ' inmates'));
    nyet.forEach(i => container.append(inmateCard(i)));
  }
}

function inmateCard(inmate) {
  const s = inmate.stats;
  const rec = getLedgerRecord(inmate.username);
  const isOpen = state.expanded === inmate.username;
  const fullName = nameFor(inmate.username);
  const primary = fullName || inmate.username;
  const sub = fullName ? inmate.username : '';

  const badgeText = s.eligible > 0
    ? s.eligible + ' reward' + (s.eligible > 1 ? 's' : '')
    : fmtHrs(s.hoursUntilNext) + ' needed';

  const badge = h('div', {
    class: 'badge ' + (s.eligible > 0 ? 'badge-eligible' : 'badge-pending')
  }, badgeText);

  const nameBlock = h('div', { class: 'inmate-name' },
    h('div', { class: 'inmate-name-primary' }, primary),
    sub ? h('div', { class: 'inmate-name-sub' }, sub) : null,
    h('div', { class: 'progress-bar-wrap' },
      h('div', {
        class: 'progress-bar-fill',
        style: 'width:' + (s.eligible > 0 ? 100 : s.pct) + '%'
      })
    )
  );

  const claimLabel = rec.claimedBy
    ? 'Claimed by ' + rec.claimedBy
    : 'Unclaimed';

  const timeBlock = h('div', { class: 'inmate-time' },
    h('div', { class: 'inmate-time-main' }, fmtTime(inmate.totalSecs)),
    h('div', { class: 'inmate-time-sub' },
      s.rewarded + ' applied · ' + fmtHrs(s.banked) + ' banked'
    ),
    h('div', {
      class: 'inmate-time-sub',
      style: 'margin-top:2px;'
    }, claimLabel)
  );

  const chevron = h('span', {
    class: 'inmate-chevron' + (isOpen ? ' open' : '')
  }, '▼');

  const header = h('div', {
    class: 'inmate-header',
    onclick: () => {
      state.expanded = state.expanded === inmate.username ? null : inmate.username;
      render();
    }
  }, badge, nameBlock, timeBlock, chevron);

  const claimBtn = h('button', {
    onclick: () => claimInmate(inmate.username),
    ...(rec.claimedBy && rec.claimedBy === getCurrentUser() ? { disabled: '' } : {})
  }, rec.claimedBy === getCurrentUser() ? 'Claimed by you' : 'Claim');

  const unclaimBtn = h('button', {
    onclick: () => unclaimInmate(inmate.username),
    ...(rec.claimedBy === getCurrentUser() ? {} : { disabled: '' })
  }, 'Unclaim');

  const applyDisabled = s.eligible === 0 || !s.canApplyThisWeek || isClaimedByOther(inmate.username);
  const applyLabel = !s.canApplyThisWeek
    ? 'Already rewarded this week'
    : (s.eligible > 0 ? '✓ Apply reward (' + s.eligible + ' available)' : 'Not yet eligible');

  const applyBtn = h('button', {
    class: 'btn-success',
    onclick: () => applyReward(inmate.username),
    ...(applyDisabled ? { disabled: '' } : {})
  }, applyLabel);

  const undoBtn = h('button', {
    onclick: () => undoReward(inmate.username),
    ...((s.rewarded === 0 || isClaimedByOther(inmate.username)) ? { disabled: '' } : {})
  }, 'Undo last');

  const noteTA = h('textarea', {
    id: 'note-' + inmate.username,
    placeholder: 'Flags, history, notes...'
  }, s.note);

  const saveNoteBtn = h('button', {
    class: 'btn-sm',
    onclick: () => saveNote(inmate.username)
  }, 'Save note');

  const detail = h('div', {
    class: 'inmate-detail' + (isOpen ? ' open' : '')
  },
    h('div', { class: 'detail-grid' },
      detailStat('Total hours', fmtHrs(s.totalHours)),
      detailStat('Hours applied', fmtHrs(s.hoursApplied)),
      detailStat('Hours banked', fmtHrs(s.banked)),
      detailStat('Rewards given', String(s.rewarded))
    ),
    h('div', { class: 'action-row' }, claimBtn, unclaimBtn, applyBtn, undoBtn),
    h('div', {},
      h('div', { class: 'note-label' }, 'Notes'),
      noteTA,
      h('div', { style: 'margin-top:6px;' }, saveNoteBtn)
    ),
    s.lastApplied ? h('div', {
      class: 'last-applied'
    }, 'Last reward applied: ' + s.lastApplied + (s.lastAppliedBy ? ' by ' + s.lastAppliedBy : '')) : null,
    s.claimedBy ? h('div', {
      class: 'last-applied'
    }, 'Currently claimed by: ' + s.claimedBy) : null
  );

  return h('div', { class: 'inmate-card' }, header, detail);
}

function detailStat(label, val) {
  return h('div', { class: 'detail-stat' },
    h('div', { class: 'detail-stat-label' }, label),
    h('div', { class: 'detail-stat-value' }, val)
  );
}

// ── Boot ──────────────────────────────────────────────────────────────────────
initLedger().then(() => render());
</script>
</body>
</html>
